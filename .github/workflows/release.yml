# 自动构建并发布 release
#
# 触发方式：
#   1. 推送 tag 形如 v* （如 v1.0.1）     → 正式 stable release
#   2. PR 合并到 main                    → 自动 prerelease（nightly-{日期}-{短 sha}）
#   3. GitHub Actions 页手动 Run workflow → 显式指定版本号
#
# 产物：4 个平台二进制 + SHA256SUMS
name: Build & Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 1.0.1；留空则用日期+运行号）'
        required: false
        default: ''

permissions:
  contents: write   # 创建 / 更新 release

jobs:
  build:
    name: 构建 (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            outfile: mockserver-mac-arm64
            asset_name: mockserver-mac-arm64
          - target: bun-darwin-x64
            outfile: mockserver-mac-x64
            asset_name: mockserver-mac-x64
          - target: bun-windows-x64
            outfile: mockserver-win-x64.exe
            asset_name: mockserver-win-x64.exe
          - target: bun-windows-arm64
            outfile: mockserver-win-arm64.exe
            asset_name: mockserver-win-arm64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装依赖
        run: bun install --frozen-lockfile

      - name: 构建 (${{ matrix.target }})
        run: bun build.mjs ${{ matrix.target }} ${{ matrix.outfile }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.outfile }}
          if-no-files-found: error

  release:
    name: 发布 Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 决定 tag / 版本 / 是否预发布
        id: meta
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            # 1) tag 触发 → 正式 release
            VER="${GITHUB_REF_NAME#v}"
            PRERELEASE="false"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            # 2) main push → nightly prerelease
            VER="nightly-$(date -u +%Y%m%d)-${GITHUB_SHA::7}"
            PRERELEASE="true"
          elif [[ -n "${{ inputs.version }}" ]]; then
            # 3) 手动触发 + 输入版本号 → 正式
            VER="${{ inputs.version }}"
            PRERELEASE="false"
          else
            # 4) 手动触发无版本号 → 用日期+运行号作为 prerelease
            VER="nightly-$(date -u +%Y%m%d)-r${GITHUB_RUN_NUMBER}"
            PRERELEASE="true"
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VER}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "Resolved: tag=${VER} prerelease=${PRERELEASE}"

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 生成 SHA256SUMS
        run: |
          cd artifacts
          sha256sum mockserver-* > SHA256SUMS
          cat SHA256SUMS

      - name: 创建 / 更新 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ steps.meta.outputs.prerelease }}
          files: |
            artifacts/mockserver-mac-arm64
            artifacts/mockserver-mac-x64
            artifacts/mockserver-win-x64.exe
            artifacts/mockserver-win-arm64.exe
            artifacts/SHA256SUMS
          body: |
            ## 下载

            | 平台 | 文件 | 大小 |
            |---|---|---|
            | macOS (Apple Silicon) | `mockserver-mac-arm64` | ~63 MB |
            | macOS (Intel) | `mockserver-mac-x64` | ~69 MB |
            | Windows (x64) | `mockserver-win-x64.exe` | ~97 MB |
            | Windows (ARM) | `mockserver-win-arm64.exe` | ~93 MB |

            ## 校验

            ```bash
            sha256sum -c SHA256SUMS
            ```

            ## 运行

            ```bash
            # macOS
            chmod +x mockserver-mac-arm64
            ./mockserver-mac-arm64

            # Windows
            mockserver-win-x64.exe
            ```

            首次启动会在 `~/Documents/mock-server-webui-trace.log` 写调试日志。
            默认监听 `http://127.0.0.1:5050`，自动打开浏览器。

            > LAN 访问：`MOCK_HOST=0.0.0.0 ./mockserver-mac-arm64`

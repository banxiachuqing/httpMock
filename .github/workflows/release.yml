# 自动构建并发布 release
#
# 触发：PR 合并到 main（每次合并都出新 release）
# 跳过：tag push（v* 不再触发，避免与 main 重复）
# 手动：Actions 页 Run workflow + 输入版本号可发指定版本
#
# 版本：默认 v{YYYYMMDD}-{run}（如 v20260623-5），也可手动指定
name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 1.0.3，留空用日期+运行号）'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: 构建 (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            outfile: mockserver-mac-arm64
            asset_name: mockserver-mac-arm64
          - target: bun-darwin-x64
            outfile: mockserver-mac-x64
            asset_name: mockserver-mac-x64
          - target: bun-windows-x64
            outfile: mockserver-win-x64.exe
            asset_name: mockserver-win-x64.exe
          - target: bun-windows-arm64
            outfile: mockserver-win-arm64.exe
            asset_name: mockserver-win-arm64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装依赖
        run: bun install --frozen-lockfile

      - name: 构建 (${{ matrix.target }})
        run: bun build.mjs ${{ matrix.target }} ${{ matrix.outfile }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.outfile }}
          if-no-files-found: error

  release:
    name: 发布 Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 决定版本号
        id: meta
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.version }}" ]]; then
            # 手动触发 + 输入版本号（跳过 auto-bump）
            VER="${{ inputs.version }}"
          else
            # 自动：读 package.json → bump patch
            CUR=$(node -p "require('./package.json').version")
            MAJOR=$(echo "$CUR" | cut -d. -f1)
            MINOR=$(echo "$CUR" | cut -d. -f2)
            PATCH=$(echo "$CUR" | cut -d. -f3)
            VER="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VER}" >> "$GITHUB_OUTPUT"
          echo "Resolved: tag=v${VER}"

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 生成 SHA256SUMS
        run: |
          cd artifacts
          sha256sum mockserver-* > SHA256SUMS
          cat SHA256SUMS

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/mockserver-mac-arm64
            artifacts/mockserver-mac-x64
            artifacts/mockserver-win-x64.exe
            artifacts/mockserver-win-arm64.exe
            artifacts/SHA256SUMS
          body: |
            ## 下载

            | 平台 | 文件 | 大小 |
            |---|---|---|
            | macOS (Apple Silicon) | `mockserver-mac-arm64` | ~63 MB |
            | macOS (Intel) | `mockserver-mac-x64` | ~69 MB |
            | Windows (x64) | `mockserver-win-x64.exe` | ~97 MB |
            | Windows (ARM) | `mockserver-win-arm64.exe` | ~93 MB |

            ## 校验

            ```bash
            sha256sum -c SHA256SUMS
            ```

            ## 运行

            ```bash
            # macOS
            chmod +x mockserver-mac-arm64
            ./mockserver-mac-arm64

            # Windows
            mockserver-win-x64.exe
            ```

            首次启动会在 `~/Documents/mock-server-webui-trace.log` 写调试日志。
            默认监听 `http://127.0.0.1:5050`，自动打开浏览器。

            > LAN 访问：`MOCK_HOST=0.0.0.0 ./mockserver-mac-arm64`
